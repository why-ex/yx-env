name: Build YX Environments

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        profile: [ minimal, yocto, yocto-scarthgap, yocto-kirkstone ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Optional but strongly recommended
      #- name: Setup Cachix
      #  uses: cachix/cachix-action@v14
      #  with:
      #    name: your-cache-name
      #    authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      #- name: Build devShell (sanity check)
      #  run: nix develop .#${{ matrix.profile }} -c true

      - name: Build container image
        run: nix build .#${{ matrix.profile }}

      - name: Load container image
        run: docker load < result

      #- name: Login to GHCR
      #  run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}:${{ matrix.profile }}
          docker tag $(docker images --quiet | head -n1) $IMAGE
          docker push $IMAGE
