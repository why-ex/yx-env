name: Build YX Environments

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        profile: [ minimal, yocto, yocto-scarthgap, yocto-kirkstone ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Optional but strongly recommended
      #- name: Setup Cachix
      #  uses: cachix/cachix-action@v14
      #  with:
      #    name: your-cache-name
      #    authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Compute image tag
        id: meta
        run: |
          PROFILE=${{ matrix.profile }}

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION=${{ github.ref_name }}
            VERSION=${VERSION#v}   # strip leading 'v' if present
            TAG="${VERSION}-${PROFILE}"
          else
            BRANCH=${{ github.ref_name }}
            TAG="${BRANCH}-${PROFILE}"
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Get version from flake
        id: version
        run: |
          VERSION=$(nix eval --raw .#lib.version)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify tag matches flake version
        if: github.ref_type == 'tag'
        run: |
          FLAKE_VERSION=$(nix eval --raw .#lib.version)
          TAG_VERSION=${{ github.ref_name }}
          TAG_VERSION=${TAG_VERSION#v}

          if [[ "$FLAKE_VERSION" != "$TAG_VERSION" ]]; then
            echo "Version mismatch!"
            exit 1
          fi

      #- name: Build devShell (sanity check)
      #  run: nix develop .#${{ matrix.profile }} -c true

      - name: Build container image
        run: |
          nix build .#${{ matrix.profile }}
          ls -al

      - name: Load container image
        id: load
        run: |
          OUTPUT=$(docker load < result)
          echo "$OUTPUT"

          IMAGE_NAME=$(echo "$OUTPUT" | sed -n 's/^Loaded image: //p')
          IMAGE_ID=$(echo "$OUTPUT" | sed -n 's/^Loaded image ID: //p')

          if [[ -n "$IMAGE_NAME" ]]; then
            echo "ref=$IMAGE_NAME" >> $GITHUB_OUTPUT
          else
            echo "ref=$IMAGE_ID" >> $GITHUB_OUTPUT
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push image
        run: |
          REF=${{ steps.load.outputs.ref }}

          TAG=${{ steps.meta.outputs.tag }}
          IMAGE=ghcr.io/${{ github.repository }}:$TAG

          docker tag "$REF" "$IMAGE"
          docker push "$IMAGE"

      - name: Tag latest (only for releases)
        if: github.ref_type == 'tag'
        run: |
          REF=${{ steps.load.outputs.ref }}
          IMAGE=ghcr.io/${{ github.repository }}:${{ matrix.profile }}

          docker tag "$REF" "$IMAGE"
          docker push "$IMAGE"
